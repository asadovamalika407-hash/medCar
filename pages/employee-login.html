<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xodim Kirish - MedCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .login-header i {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .login-form {
            padding: 40px 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .login-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: #666;
            font-size: 14px;
        }
        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }
        .alert-error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
        }
        .demo-credentials {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
        }
        .demo-credentials strong {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }
        .demo-credentials p {
            margin: 5px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-user-md"></i>
            <h1>MedCare Klinikasi</h1>
            <p>Xodimlar Paneli</p>
        </div>

        <div class="login-form">
            <div id="alertBox"></div>

            <form id="employeeLoginForm">
                <div class="form-group">
                    <label>Xodim ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" name="employeeId" placeholder="E-001" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Kirish
                </button>
            </form>

            <div class="demo-credentials">
                <strong><i class="fas fa-info-circle"></i> Demo Kirish Ma'lumotlari:</strong>
                <p><strong>ID:</strong> E-002 | <strong>Parol:</strong> 12345</p>
                <p><strong>ID:</strong> E-015 | <strong>Parol:</strong> 12345</p>
                <p style="margin-top: 10px; font-style: italic; color: #999;">Barcha xodimlar uchun default parol: 12345</p>
            </div>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Admin Panel</a>
        </div>
    </div>

    <script>
        document.getElementById('employeeLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const employeeId = formData.get('employeeId').toUpperCase();
            const password = formData.get('password');
            
            // Oddiy parol tekshirish (hozircha barcha xodimlar uchun 12345)
            if (password !== '12345') {
                showAlert('⚠️ Noto\'g\'ri parol!', 'error');
                return;
            }
            
            // Xodim ID tekshirish (E-001 dan E-052 gacha)
            const idNumber = parseInt(employeeId.replace('E-', ''));
            if (isNaN(idNumber) || idNumber < 1 || idNumber > 52) {
                showAlert('⚠️ Noto\'g\'ri Xodim ID!', 'error');
                return;
            }
            
            // LocalStorage ga saqlash
            localStorage.setItem('employeeLoggedIn', 'true');
            localStorage.setItem('employeeId', employeeId);
            
            // Xodim paneliga yo'naltirish
            showAlert('✅ Muvaffaqiyatli kirdingiz!', 'success');
            
            setTimeout(() => {
                window.location.href = 'employee-dashboard.html';
            }, 1000);
        });
        
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'info'}">${message}</div>`;
            
            setTimeout(() => {
                alertBox.innerHTML = '';
            }, 3000);
        }
        
        // Agar allaqachon login qilgan bo'lsa, dashboardga yo'naltirish
        if (localStorage.getItem('employeeLoggedIn') === 'true') {
            window.location.href = 'employee-dashboard.html';
        }
    </script>
</body>
</html>
