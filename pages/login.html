<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish - MedCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .login-left {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-logo {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-left h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .login-left p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .login-right {
            padding: 60px 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #2563eb;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #1e40af;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .back-home {
            text-align: center;
            margin-top: 25px;
        }

        .back-home a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-home a:hover {
            color: #2563eb;
        }

        .user-roles {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-card {
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-card:hover {
            border-color: #2563eb;
            background: #f0f7ff;
        }

        .role-card.active {
            border-color: #2563eb;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        }

        .role-card i {
            font-size: 30px;
            color: #2563eb;
            margin-bottom: 8px;
        }

        .role-card span {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #1f2937;
        }

        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }

            .login-left {
                padding: 40px 30px;
            }

            .login-right {
                padding: 40px 30px;
            }

            .user-roles {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-logo">
                <i class="fas fa-hospital"></i>
            </div>
            <h1>MedCare</h1>
            <p>Xususiy klinika boshqaruv tizimi. Xavfsiz kirish orqali barcha imkoniyatlardan foydalaning.</p>
        </div>

        <div class="login-right">
            <div class="login-header">
                <h2>Tizimga kirish</h2>
                <p>Hisobingizga kirish uchun ma'lumotlarni kiriting</p>
            </div>

            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="user-roles">
                    <div class="role-card active" onclick="selectRole('admin')">
                        <i class="fas fa-user-shield"></i>
                        <span>Administrator</span>
                    </div>
                    <div class="role-card" onclick="selectRole('doctor')">
                        <i class="fas fa-user-md"></i>
                        <span>Shifokor</span>
                    </div>
                    <div class="role-card" onclick="selectRole('pharmacy')">
                        <i class="fas fa-pills"></i>
                        <span>Dorixona</span>
                    </div>
                </div>

                <input type="hidden" id="userRole" value="admin">

                <div class="form-group">
                    <label>Foydalanuvchi nomi</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="username" placeholder="Username kiriting" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" placeholder="Parolni kiriting" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Eslab qolish</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="showPasswords(event)">Parolni unutdingizmi?</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Kirish
                </button>

                <div class="back-home">
                    <a href="../index.html">
                        <i class="fas fa-arrow-left"></i>
                        Bosh sahifaga qaytish
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let selectedRole = 'admin';

        // Demo hisoblar
        const users = {
            admin: { username: 'admin', password: 'admin123', redirect: 'admin-panel.html' },
            doctor: { username: 'doctor', password: 'doctor123', redirect: 'admin-panel.html' },
            pharmacy: { username: 'pharmacy', password: 'pharmacy123', redirect: 'pharmacy-admin.html' }
        };

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('userRole').value = role;
            
            const cards = document.querySelectorAll('.role-card');
            cards.forEach(card => card.classList.remove('active'));
            event.target.closest('.role-card').classList.add('active');
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function showPasswords(event) {
            event.preventDefault();
            
            const message = `
🔐 BARCHA PAROLLAR:

👨‍💼 Admin:
   Login: admin
   Parol: admin123

👨‍⚕️ Shifokor:
   Login: doctor
   Parol: doctor123

💊 Dorixona Admin:
   Login: pharmacy
   Parol: pharmacy123
            `;
            
            alert(message);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = selectedRole;
            
            // Tekshirish
            if (users[role].username === username && users[role].password === password) {
                // Sessionga saqlash
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', role);
                sessionStorage.setItem('username', username);
                
                // Muvaffaqiyatli xabar
                showNotification('✅ Muvaffaqiyatli kirildi!', 'success');
                
                // Rolga qarab yo'naltirish
                setTimeout(() => {
                    window.location.href = users[role].redirect;
                }, 1000);
            } else {
                showNotification('❌ Login yoki parol xato!', 'error');
            }
        }

        function showNotification(message, type) {
            const colors = {
                success: '#10b981',
                error: '#ef4444'
            };
            
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 30px;
                right: 30px;
                background: ${colors[type]};
                color: white;
                padding: 18px 28px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                z-index: 3000;
                font-weight: 600;
                font-size: 16px;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // CSS animatsiyalar
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
