<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorixona - MedCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Cart Floating Button */
        .cart-floating {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .cart-floating:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            border: 3px solid white;
        }

        /* Cart Modal */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: white;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .cart-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .cart-body {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .cart-empty i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .cart-items {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
        }

        .cart-item:hover {
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 16px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .cart-item-details {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .cart-item-price {
            font-weight: 700;
            color: #2563eb;
            font-size: 18px;
        }

        .cart-item-remove {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .cart-item-remove:hover {
            background: #dc2626;
            color: white;
        }

        .cart-summary {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: 700;
            color: #1e40af;
            padding-top: 15px;
            border-top: 2px solid rgba(30, 64, 175, 0.2);
            margin-top: 10px;
        }

        .delivery-form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1f2937;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2563eb;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .checkout-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body class="inner-page">
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon"><i class="fas fa-hospital"></i></span>
                    <div class="logo-text">
                        <h1>MedCare</h1>
                        <p>Xususiy klinika - Toshkent</p>
                    </div>
                </div>
                <div class="header-actions">
                    <a href="tel:+998712001010" class="phone"><i class="fas fa-phone-alt"></i> +998 71 200 10 10</a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-content" style="padding: 60px 0;">
        <div class="container">
            <div style="text-align: center; margin-bottom: 50px;">
                <h1 style="font-size: 42px; color: #1e40af; margin-bottom: 10px; font-weight: 700;">Klinika dorixonasi</h1>
                <p style="color: var(--text-light); font-size: 16px;">Retsept asosida dorilar va tibbiy mahsulotlar</p>
            </div>

            <div style="text-align: center; margin-bottom: 40px;">
                <a href="../index.html" class="back-to-home">
                    <i class="fas fa-arrow-left"></i> Bosh sahifaga qaytish
                </a>
            </div>

            <div style="background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);">
                            <th style="padding: 20px 25px; text-align: left; color: white; font-weight: 600; font-size: 14px; border-radius: 20px 0 0 0;">#</th>
                            <th style="padding: 20px 20px; text-align: left; color: white; font-weight: 600; font-size: 14px;">Dori nomi</th>
                            <th style="padding: 20px 20px; text-align: left; color: white; font-weight: 600; font-size: 14px;">Guruh</th>
                            <th style="padding: 20px 20px; text-align: left; color: white; font-weight: 600; font-size: 14px;">Miqdor</th>
                            <th style="padding: 20px 20px; text-align: left; color: white; font-weight: 600; font-size: 14px;">Narxi</th>
                            <th style="padding: 20px 20px; text-align: left; color: white; font-weight: 600; font-size: 14px;">Holat</th>
                            <th style="padding: 20px 25px; text-align: center; color: white; font-weight: 600; font-size: 14px; border-radius: 0 20px 0 0;">Savat</th>
                        </tr>
                    </thead>
                    <tbody id="medicineTable"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Cart Floating Button -->
    <button class="cart-floating" onclick="openCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
    </button>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-cart"></i> Savatingiz</h2>
                <button class="cart-close" onclick="closeCart()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="cart-body" id="cartBody"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2025 MedCare. Barcha huquqlar himoyalangan</p>
            </div>
        </div>
    </footer>

    <script src="../js/pharmacy-cart.js"></script>
</body>
</html>
